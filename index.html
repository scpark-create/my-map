<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RECO Manager - Compass View Optimized</title>
    <style>
        :root { --primary-red: #ff4757; --primary-blue: #007bff; --kakao-yellow: #FFEB00; --lead-green: #2ecc71; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background: #f8f9fa; }
        
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-box { width: 100%; max-width: 340px; padding: 30px; background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 16px; background: #4285f4; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }

        #main-content { display: none; position: relative; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }

        /* 바텀 시트 */
        #bottom-sheet { 
            position: absolute; bottom: -100%; left: 0; width: 100%; background: white; 
            z-index: 2000; border-radius: 24px 24px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            transition: bottom 0.3s ease-in-out; padding: 25px 20px; box-sizing: border-box;
            max-height: 70vh; overflow-y: auto;
        }
        #bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #e0e0e0; border-radius: 10px; margin: -10px auto 15px; cursor: pointer; }

        /* 하단 필터 바 */
        .bottom-nav { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 10px; background: rgba(255,255,255,0.9); 
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px); width: 85%; max-width: 400px; justify-content: space-around; 
        }
        .nav-btn { border: none; background: none; font-size: 12px; font-weight: bold; color: #aaa; cursor: pointer; }
        .nav-btn.active#btn-existing { color: var(--primary-red); }
        .nav-btn.active#btn-new { color: var(--primary-blue); }

        /* 업장명 라벨 */
        .marker-label {
            background: white; color: black; padding: 4px 12px; border-radius: 12px; border: 1.5px solid #333;
            font-size: 13px; font-weight: bold; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.2); position: relative;
        }
        .marker-label::after {
            content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
            border-width: 6px 6px 0; border-style: solid; border-color: #333 transparent transparent;
        }

        /* 📍 이미지 참고: 나침반 및 위치 마커 디자인 구현 */
        .user-marker-wrapper { position: relative; width: 300px; height: 300px; transform: translate(-150px, -150px); display: flex; align-items: center; justify-content: center; pointer-events: none; }
        
        /* 부채꼴 시야 (이미지처럼 부드러운 그라데이션) */
        .view-cone {
            position: absolute; width: 220px; height: 220px;
            background: radial-gradient(circle at 50% 50%, rgba(0, 123, 255, 0.4) 0%, rgba(0, 123, 255, 0.1) 60%, transparent 75%);
            clip-path: polygon(50% 50%, 15% 0%, 85% 0%); /* 60도 각도의 시야각 */
            display: none; transition: transform 0.1s linear; transform-origin: center center;
        }
        
        /* 방향 화살표 삼각형 */
        .dir-arrow {
            position: absolute; top: 110px; /* 위치 점 바로 위 */
            width: 0; height: 0;
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-bottom: 12px solid var(--primary-red);
            display: none; transition: transform 0.1s linear; transform-origin: 50% 120%;
        }

        /* 중앙 위치 점 (이미지처럼 흰색 테두리가 있는 빨간 점) */
        .center-dot {
            width: 16px; height: 16px; background: var(--primary-red);
            border: 3px solid white; border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.3); z-index: 10;
        }

        /* 컨트롤 버튼 */
        .side-btns { position: absolute; top: 20px; right: 15px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
        .side-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .side-btn.compass { background: var(--primary-blue); color: white; }

        .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .info-item { font-size: 12px; color: #666; }
        .info-item b { display: block; color: #222; font-size: 14px; margin-top: 2px; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2>RECO Manager</h2>
        <input type="text" id="username" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="checkLogin()">접속하기</button>
        <p id="error-msg" style="color:var(--primary-red); font-size:12px; display:none; margin-top:15px;">정보가 일치하지 않습니다.</p>
    </div>
</div>

<div id="main-content">
    <div class="side-btns">
        <button class="side-btn" onclick="location.reload()">🔑</button>
        <button id="rv-toggle-btn" class="side-btn" onclick="toggleRoadviewMode()">📷</button>
        <button id="loc-btn" class="side-btn" onclick="toggleLocationMode()">📍</button>
    </div>

    <div id="rv-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 3000; display: none;">
        <button style="position:absolute; top:10px; right:10px; z-index:3001;" onclick="closeRoadview()">닫기</button>
        <div id="roadview" style="width:100%;height:100%;"></div>
    </div>

    <div id="bottom-sheet">
        <div class="sheet-handle" onclick="closeSheet(); resetSelectedMarker();"></div>
        <div id="sheet-content"></div>
    </div>

    <div class="bottom-nav">
        <button id="btn-existing" class="nav-btn active" onclick="toggleFilter('existing')">● 기존고객</button>
        <button id="btn-new" class="nav-btn active" onclick="toggleFilter('new')">★ 나의영업</button>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=674d9cff0f9b5e8d49e24339fdc1c033&libraries=services,clusterer"></script>

<script>
const loginCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=1603902648&single=true&output=csv';
const existingCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=0&single=true&output=csv';
const salesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=676390554&single=true&output=csv';

let map, clustererExist, clustererSales, userLatLng = null, userMarker = null, rv, rvClient;
let allRawData = [], filterStatus = { existing: true, new: true };
let currentUserId = "", userRole = "saler", userLimitRange = 1000, userLimitArea = "";
let selectedMarker = null, selectedType = null, labelOverlay = null, rvMode = false;
let locationMode = 1; // 1: 기본이동, 2: 방향추적

// 마커 이미지: 기존고객 마커 크기 확대 (15px)
const redDot = 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"><circle cx="7.5" cy="7.5" r="6" fill="#ff4757" stroke="white" stroke-width="2"/></svg>');
const blueStar = 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="#007bff" stroke="white" stroke-width="1.5" d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z"/></svg>');

function cleanCoord(val) { return val ? parseFloat(val.toString().replace(/[^0-9.]/g, '')) : null; }

async function checkLogin() {
    const userIn = document.getElementById('username').value.trim().toLowerCase();
    const passIn = document.getElementById('password').value.trim();
    try {
        const res = await fetch(loginCsvUrl + '&t=' + Date.now());
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);
        let auth = false;
        for (let row of rows) {
            const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
            if (cols[0].toLowerCase() === userIn && cols[1] === passIn) { 
                auth = true; currentUserId = userIn; userRole = cols[2].toLowerCase(); 
                userLimitRange = parseInt(cols[3]) || 1000;
                userLimitArea = cols[4] || ""; 
                break; 
            }
        }
        if (auth) initApp();
        else document.getElementById('error-msg').style.display = 'block';
    } catch (e) { alert("데이터 연결 실패"); }
}

function initApp() {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 4 });
    
    rvClient = new kakao.maps.RoadviewClient();
    rv = new kakao.maps.Roadview(document.getElementById('roadview'));

    if (userRole === 'master') {
        clustererExist = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
        clustererSales = new kakao.maps.MarkerClusterer({ map: map, averageCenter: true, minLevel: 7 });
    }

    kakao.maps.event.addListener(map, 'click', function() { closeSheet(); resetSelectedMarker(); });
    
    loadData();
    startLocationTracking();
}

function toggleLocationMode() {
    const btn = document.getElementById('loc-btn');
    if (locationMode === 1) {
        locationMode = 2;
        btn.innerText = "🧭"; btn.className = "side-btn compass";
        startCompass();
    } else {
        locationMode = 1;
        btn.innerText = "📍"; btn.className = "side-btn";
        stopCompass();
        moveToCurrentLocation();
    }
}

function startLocationTracking() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            userLatLng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            updateUserMarker();
        }, null, { enableHighAccuracy: true });
    }
}

function moveToCurrentLocation() { if (userLatLng) map.panTo(userLatLng); }

function startCompass() {
    if (window.DeviceOrientationEvent) {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
            }).catch(console.error);
        } else {
            window.addEventListener('deviceorientation', handleOrientation, true);
        }
    }
}

function stopCompass() {
    window.removeEventListener('deviceorientation', handleOrientation, true);
    const cone = document.getElementById('view-cone');
    const arrow = document.getElementById('dir-arrow');
    if (cone) cone.style.display = 'none';
    if (arrow) arrow.style.display = 'none';
}

function handleOrientation(event) {
    const cone = document.getElementById('view-cone');
    const arrow = document.getElementById('dir-arrow');
    if (!cone || locationMode !== 2) return;
    
    cone.style.display = 'block';
    arrow.style.display = 'block';
    
    let heading = event.webkitCompassHeading || (360 - event.alpha);
    if (heading) {
        cone.style.transform = `rotate(${heading}deg)`;
        arrow.style.transform = `rotate(${heading}deg)`;
    }
}

function updateUserMarker() {
    if (userMarker) userMarker.setMap(null);
    const content = `
        <div class="user-marker-wrapper">
            <div id="view-cone" class="view-cone"></div>
            <div id="dir-arrow" class="dir-arrow"></div>
            <div class="center-dot"></div>
        </div>`;
    userMarker = new kakao.maps.CustomOverlay({ position: userLatLng, content: content, zIndex: 10 });
    userMarker.setMap(map);
}

async function loadData() {
    const [resExist, resSales] = await Promise.all([ fetch(existingCsvUrl + '&t=' + Date.now()), fetch(salesCsvUrl + '&t=' + Date.now()) ]);
    const txtExist = await resExist.text(), txtSales = await resSales.text();
    allRawData = [];
    txtExist.split(/\r?\n/).slice(1).forEach(row => {
        const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        if (c.length >= 4) allRawData.push({ type: 'existing', name: c[0], addr: c[1], lat: cleanCoord(c[2]), lng: cleanCoord(c[3]), extra: { "계약단가": c[4], "요금제": c[5], "수거요일": c[6], "서비스유형": c[7], "기본수량": c[8], "기본요금": c[9], "월수거량": c[10], "용기수": c[11] } });
    });
    txtSales.split(/\r?\n/).slice(1).forEach(row => {
        const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        if (c.length >= 5) allRawData.push({ type: 'new', ownerId: c[0]?.toLowerCase(), name: c[1], addr: c[2], lat: cleanCoord(c[3]), lng: cleanCoord(c[4]), extra: { "업종구분": c[5], "면적": c[6], "예상배출": c[7], "인원": c[8] } });
    });
    refreshDataVisibility();
}

function refreshDataVisibility() {
    if (clustererExist) { clustererExist.clear(); clustererSales.clear(); }
    allRawData.forEach(d => { if(d.m) d.m.setMap(null); });
    const isMaster = (userRole === 'master');
    const markersExist = [], markersSales = [];

    allRawData.forEach(d => {
        if (!filterStatus[d.type]) return;
        const pos = new kakao.maps.LatLng(d.lat, d.lng);
        const idMatch = (d.type === 'existing' || isMaster || (d.ownerId === currentUserId));
        let locMatch = isMaster;
        if (!isMaster && userLatLng) {
            const line = new kakao.maps.Polyline({ path: [userLatLng, pos] });
            if (line.getLength() <= userLimitRange || d.addr.includes(userLimitArea)) locMatch = true;
        }
        if (locMatch && idMatch) {
            const marker = new kakao.maps.Marker({ 
                position: pos, 
                image: new kakao.maps.MarkerImage(d.type === 'existing' ? redDot : blueStar, d.type === 'existing' ? new kakao.maps.Size(15, 15) : new kakao.maps.Size(18, 18)) 
            });
            d.m = marker;
            kakao.maps.event.addListener(marker, 'click', function() { highlightMarker(marker, d); showSheet(d); map.panTo(pos); });
            if (isMaster) {
                if (d.type === 'existing') markersExist.push(marker); else markersSales.push(marker);
            } else { marker.setMap(map); }
        }
    });
    if (isMaster) { clustererExist.addMarkers(markersExist); clustererSales.addMarkers(markersSales); }
}

function highlightMarker(marker, data) {
    resetSelectedMarker();
    selectedMarker = marker; selectedType = data.type;
    const size = data.type === 'existing' ? 25 : 35;
    marker.setImage(new kakao.maps.MarkerImage(data.type === 'existing' ? redDot : blueStar, new kakao.maps.Size(size, size)));
    marker.setZIndex(100);
    labelOverlay = new kakao.maps.CustomOverlay({ 
        position: marker.getPosition(), 
        content: `<div class="marker-label">${data.name}</div>`, 
        yAnchor: 2.5 
    });
    labelOverlay.setMap(map);
}

function resetSelectedMarker() {
    if (selectedMarker && selectedType) {
        const originalSize = selectedType === 'existing' ? new kakao.maps.Size(15, 15) : new kakao.maps.Size(18, 18);
        selectedMarker.setImage(new kakao.maps.MarkerImage(selectedType === 'existing' ? redDot : blueStar, originalSize));
        selectedMarker.setZIndex(1);
    }
    selectedMarker = null; selectedType = null;
    if (labelOverlay) { labelOverlay.setMap(null); labelOverlay = null; }
}

function showSheet(data) {
    const content = document.getElementById('sheet-content');
    let html = `<div style="font-size:20px; font-weight:bold; margin-bottom:5px;">${data.name}</div><div style="font-size:13px; color:#888; margin-bottom:15px;">${data.addr}</div><div class="sheet-grid">`;
    Object.entries(data.extra).forEach(([k, v]) => { html += `<div class="info-item">${k}<b>${v || '-'}</b></div>`; });
    html += `</div><div style="display:flex; gap:10px; margin-top:20px;"><a href="https://map.kakao.com/link/to/${encodeURIComponent(data.name)},${data.lat},${data.lng}" target="_blank" class="action-btn" style="flex:1; background:var(--kakao-yellow); padding:15px; text-align:center; border-radius:12px; text-decoration:none; font-weight:bold; color:#3C1E1E;">🚕 길찾기</a></div>`;
    content.innerHTML = html;
    document.getElementById('bottom-sheet').classList.add('active');
}

function closeSheet() { document.getElementById('bottom-sheet').classList.remove('active'); }
function toggleRoadviewMode() { rvMode = !rvMode; document.getElementById('rv-toggle-btn').classList.toggle('active', rvMode); if (rvMode) map.addOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW); else map.removeOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW); }
function closeRoadview() { document.getElementById('rv-container').style.display = 'none'; }
function toggleFilter(type) { filterStatus[type] = !filterStatus[type]; document.getElementById('btn-' + type).classList.toggle('active', filterStatus[type]); refreshDataVisibility(); }
</script>
</body>
</html>
