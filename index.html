<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RECO Manager - Toolbox Fixed</title>
    <style>
        :root { --primary-red: #ff4757; --primary-blue: #007bff; --kakao-yellow: #FFEB00; --lead-green: #2ecc71; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background: #f8f9fa; }
        
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-box { width: 100%; max-width: 340px; padding: 30px; background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 16px; background: #4285f4; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }

        #main-content { display: none; position: relative; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }

        #map [style*="cursor: pointer"], #map [style*="cursor:pointer"], .kakao-marker, area { cursor: pointer !important; }

        .side-btns { position: absolute; top: 20px; right: 15px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
        .side-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .side-btn.active { background: var(--kakao-yellow); color: #000; }

        .tool-box { background: white; border-radius: 15px; padding: 5px; display: flex; flex-direction: column; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #eee; }
        .tool-btn { width: 40px; height: 40px; border: none; background: none; cursor: pointer; font-size: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .tool-btn.active { background: #333; color: white; }

        /* 📍 측정 정보 박스 (카카오맵 스타일) */
        .dotOverlay {
            position: relative; bottom: 10px; border-radius: 6px; border: 1px solid #ccc;
            border-bottom: 2px solid #ddd; padding: 10px; background: #fff;
            white-space: nowrap; font-size: 12px; z-index: 3000; color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .dotOverlay b { color: #ee6152; }
        .dotOverlay ul { list-style: none; padding: 0; margin: 5px 0 0 0; border-top: 1px solid #eee; }
        .dotOverlay li { margin-top: 3px; }
        .dotOverlay .label { display: inline-block; width: 45px; color: #888; }

        /* 실시간 안내용 말풍선 */
        .measure-info { position: relative; bottom: 15px; border-radius: 6px; border: 1px solid #ccc; padding: 5px 10px; background: #fff; white-space: nowrap; font-size: 12px; z-index: 3000; color: #333; }

        #bottom-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: white; z-index: 2000; border-radius: 24px 24px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.15); transition: bottom 0.3s ease-in-out; padding: 25px 20px; box-sizing: border-box; max-height: 70vh; overflow-y: auto; }
        #bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #e0e0e0; border-radius: 10px; margin: -10px auto 15px; }

        @keyframes rainbow-bg { 0% { background: #ff0000; } 50% { background: #00ff00; } 100% { background: #ff00ff; } }
        .user-marker-wrapper { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .rainbow-dot { width: 16px; height: 16px; border: 3.5px solid white; border-radius: 50%; animation: rainbow-bg 3s infinite linear; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 10; }
        .view-cone { position: absolute; width: 200px; height: 200px; background: radial-gradient(circle at 50% 50%, rgba(0, 123, 255, 0.45) 0%, rgba(0, 123, 255, 0) 70%); clip-path: polygon(50% 50%, 15% 0%, 85% 0%); display: none; transition: transform 0.1s linear; z-index: 5; }

        .bottom-nav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); backdrop-filter: blur(10px); width: 85%; max-width: 400px; justify-content: space-around; }
        .nav-btn { border: none; background: none; font-size: 13px; font-weight: bold; color: #ccc; cursor: pointer; }
        .nav-btn.active#btn-existing { color: var(--primary-red); }
        .nav-btn.active#btn-new { color: var(--primary-blue); }

        .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .info-item { font-size: 12px; color: #666; }
        .info-item b { display: block; color: #222; font-size: 14px; margin-top: 2px; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2>RECO Manager</h2>
        <input type="text" id="username" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="checkLogin()">접속하기</button>
        <p id="error-msg" style="color:var(--primary-red); font-size:12px; display:none; margin-top:15px;">정보가 일치하지 않습니다.</p>
    </div>
</div>

<div id="main-content">
    <div class="side-btns">
        <button class="side-btn" onclick="location.reload()">🔑</button>
        <button id="loc-btn" class="side-btn" onclick="moveToCurrentLocation()">📍</button>
        <div class="tool-box">
            <button id="btn-polyline" class="tool-btn" onclick="selectTool('POLYLINE')">📏</button>
            <button id="btn-polygon" class="tool-btn" onclick="selectTool('POLYGON')">📐</button>
            <button id="btn-circle" class="tool-btn" onclick="selectTool('CIRCLE')">⭕</button>
            <button class="tool-btn" onclick="resetDrawings()" style="font-size:14px; color:#999;">✖</button>
        </div>
        <button id="rv-toggle-btn" class="side-btn" onclick="toggleRoadviewMode()">📷</button>
        <button id="compass-btn" class="side-btn" onclick="toggleCompassMode()">🧭</button>
    </div>

    <div id="bottom-sheet">
        <div class="sheet-handle" onclick="closeSheet()"></div>
        <div id="sheet-content"></div>
    </div>
    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=674d9cff0f9b5e8d49e24339fdc1c033&libraries=services,clusterer,drawing"></script>

<script>
const loginCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=1603902648&single=true&output=csv';
const existingCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=0&single=true&output=csv';
const salesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=676390554&single=true&output=csv';

let map, manager, userLatLng = null, userMarkerOverlay = null;
let allRawData = [], currentUserId = "", userRole = "";
let measureOverlay = null, currentToolMode = null, points = [];
let resultOverlays = []; 
let compassMode = false;

const existingIcon = 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect width="14" height="14" x="1" y="1" fill="#ff4757" stroke="white" stroke-width="2"/></svg>');
const salesIcon = 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="#007bff" stroke="white" stroke-width="2" d="M12 2L2 22h20L12 2z"/></svg>');

async function checkLogin() {
    const userIn = document.getElementById('username').value.trim().toLowerCase();
    const passIn = document.getElementById('password').value.trim();
    try {
        const res = await fetch(loginCsvUrl + '&t=' + Date.now());
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);
        let auth = false;
        for (let row of rows) {
            const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
            if (cols[0].toLowerCase() === userIn && cols[1] === passIn) { 
                auth = true; currentUserId = userIn; userRole = cols[2].toLowerCase(); break; 
            }
        }
        if (auth) initApp(); else document.getElementById('error-msg').style.display = 'block';
    } catch (e) { alert("연결 실패"); }
}

function initApp() {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    map = new kakao.maps.Map(document.getElementById('map'), { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 4 });

    const drawOptions = {
        map: map,
        drawingMode: [],
        polylineOptions: { draggable: false, removable: true, strokeColor: '#ee6152', strokeOpacity: 1, strokeWeight: 3 },
        polygonOptions: { draggable: false, removable: true, fillColor: '#39f', fillOpacity: 0.3, strokeColor: '#39f', strokeOpacity: 1, strokeWeight: 2 },
        circleOptions: { draggable: false, removable: true, fillColor: '#f100ff', fillOpacity: 0.2, strokeColor: '#f100ff', strokeOpacity: 1, strokeWeight: 2 }
    };
    manager = new kakao.maps.drawing.DrawingManager(drawOptions);

    // 📏 그리기 완료 시 최종 결과 박스 생성
    manager.addListener('drawend', function(data) {
        showFinalResult(data);
        finishMeasurement();
    });

    // 📐 실시간 측정값 업데이트용 지도 이벤트
    kakao.maps.event.addListener(map, 'click', function(e) {
        if (currentToolMode) points.push(e.latLng);
    });

    kakao.maps.event.addListener(map, 'mousemove', function(e) {
        if (currentToolMode && points.length > 0) updateLiveMeasureLabel(e.latLng);
    });

    kakao.maps.event.addListener(map, 'rightclick', function() {
        if (currentToolMode) finishMeasurement();
    });

    startGPSWatch();
    loadData();
}

function selectTool(type) {
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    manager.cancel();
    points = [];
    currentToolMode = type;
    manager.select(kakao.maps.drawing.OverlayType[type]);
    document.getElementById('btn-' + type.toLowerCase()).classList.add('active');
    map.setDraggable(false);
}

// 실시간 측정 레이블 (마우스 따라다님)
function updateLiveMeasureLabel(mousePos) {
    let text = "";
    if (currentToolMode === 'POLYLINE') {
        let dist = 0;
        for (let i = 0; i < points.length - 1; i++) dist += getDistance(points[i], points[i+1]);
        dist += getDistance(points[points.length-1], mousePos);
        text = `거리: <b>${Math.round(dist).toLocaleString()}</b>m`;
    } else if (currentToolMode === 'CIRCLE') {
        let rad = getDistance(points[0], mousePos);
        text = `반경: <b>${Math.round(rad).toLocaleString()}</b>m`;
    } else if (currentToolMode === 'POLYGON') {
        text = `면적 측정 중... (우클릭 종료)`;
    }

    if (text) {
        if (!measureOverlay) measureOverlay = new kakao.maps.CustomOverlay({ yAnchor: 1.5, zIndex: 3005 });
        measureOverlay.setContent(`<div class="measure-info">${text}</div>`);
        measureOverlay.setPosition(mousePos);
        measureOverlay.setMap(map);
    }
}

// 최종 정보 박스 표시
function showFinalResult(data) {
    let content = '';
    let pos = null;

    if (data.overlayType === 'polyline') {
        const dist = Math.round(data.target.getLength());
        const path = data.target.getPath();
        pos = path[path.length - 1];
        content = `<div class="dotOverlay">총거리 <b>${dist.toLocaleString()}</b>m<ul><li><span class="label">도보</span><b>${Math.ceil(dist/67)}</b>분</li><li><span class="label">자전거</span><b>${Math.ceil(dist/227)}</b>분</li></ul></div>`;
    } else if (data.overlayType === 'circle') {
        const rad = Math.round(data.target.getRadius());
        pos = data.target.getCenter();
        content = `<div class="dotOverlay">반경 <b>${rad.toLocaleString()}</b>m<ul><li><span class="label">도보</span><b>${Math.ceil(rad/67)}</b>분</li><li><span class="label">자전거</span><b>${Math.ceil(rad/227)}</b>분</li></ul></div>`;
    } else if (data.overlayType === 'polygon') {
        const area = Math.round(data.target.getArea());
        const path = data.target.getPath();
        pos = path[path.length - 1];
        content = `<div class="dotOverlay">총면적 <b>${area.toLocaleString()}</b> m²</div>`;
    }

    if (content && pos) {
        const resultOverlay = new kakao.maps.CustomOverlay({ position: pos, content: content, yAnchor: 1.2, zIndex: 3000 });
        resultOverlay.setMap(map);
        resultOverlays.push(resultOverlay);
    }
}

function finishMeasurement() {
    manager.cancel();
    map.setDraggable(true);
    currentToolMode = null;
    points = [];
    if (measureOverlay) measureOverlay.setMap(null);
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
}

function getDistance(p1, p2) {
    const poly = new kakao.maps.Polyline({ path: [p1, p2] });
    return poly.getLength();
}

function resetDrawings() {
    manager.cancel();
    const overlays = manager.getOverlays();
    for (let type in overlays) overlays[type].forEach(o => o.setMap(null));
    resultOverlays.forEach(o => o.setMap(null));
    resultOverlays = [];
    finishMeasurement();
}

function startGPSWatch() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            const isFirst = (userLatLng === null);
            userLatLng = new kakao.maps.LatLng(lat, lng);
            if (userMarkerOverlay) userMarkerOverlay.setMap(null);
            userMarkerOverlay = new kakao.maps.CustomOverlay({
                position: userLatLng,
                content: '<div class="user-marker-wrapper"><div id="view-cone" class="view-cone"></div><div class="rainbow-dot"></div></div>',
                zIndex: 1000
            });
            userMarkerOverlay.setMap(map);
            if (isFirst) { map.setCenter(userLatLng); loadData(); }
        }, null, { enableHighAccuracy: true });
    }
}

function moveToCurrentLocation() { if (userLatLng) map.panTo(userLatLng); }

async function loadData() {
    const [resExist, resSales] = await Promise.all([ fetch(existingCsvUrl + '&t=' + Date.now()), fetch(salesCsvUrl + '&t=' + Date.now()) ]);
    const txtExist = await resExist.text(), txtSales = await resSales.text();
    allRawData = [];
    txtExist.split(/\r?\n/).slice(1).forEach(row => {
        const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        if (c.length >= 10) allRawData.push({ type: 'existing', name: c[0], addr: c[1], lat: parseFloat(c[2]), lng: parseFloat(c[3]), extra: { "계약단가": c[4], "수거요일": c[6], "월수거량": c[10] } });
    });
    txtSales.split(/\r?\n/).slice(1).forEach(row => {
        const c = row.split(',').map(v => v.replace(/^"$/g, '').trim());
        if (c.length >= 8) allRawData.push({ type: 'new', ownerId: c[0]?.toLowerCase(), name: c[1], addr: c[2], lat: parseFloat(c[3]), lng: parseFloat(c[4]), extra: { "업종": c[5], "배출량": c[7] } });
    });
    
    allRawData.forEach(d => {
        if (userRole === 'master' || d.type === 'existing' || d.ownerId === currentUserId) {
            const marker = new kakao.maps.Marker({
                position: new kakao.maps.LatLng(d.lat, d.lng),
                image: new kakao.maps.MarkerImage(d.type === 'existing' ? existingIcon : salesIcon, new kakao.maps.Size(16, 16)),
                clickable: true
            });
            marker.setMap(map);
            kakao.maps.event.addListener(marker, 'click', () => showSheet(d));
        }
    });
}

function showSheet(data) {
    const content = document.getElementById('sheet-content');
    let html = `<div style="font-size:20px; font-weight:bold;">${data.name}</div><div style="font-size:13px; color:#888;">${data.addr}</div><div class="sheet-grid">`;
    Object.entries(data.extra).forEach(([k, v]) => { html += `<div class="info-item">${k}<b>${v || '-'}</b></div>`; });
    html += `</div><div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;"><a href="https://map.kakao.com/link/to/${encodeURIComponent(data.name)},${data.lat},${data.lng}" target="_blank" class="sheet-btn" style="background:var(--kakao-yellow); border-radius:12px; text-decoration:none; font-weight:bold; color:#3C1E1E;">🚕 길찾기</a>`;
    if (data.type === 'new') html += `<a href="https://walla.my/v/GEQSSOWtFYHulcSoAKC3" target="_blank" class="sheet-btn" style="background:var(--lead-green); color:white; border-radius:12px; text-decoration:none; font-weight:bold;">📝 리드건 신청</a>`;
    html += `</div>`;
    content.innerHTML = html;
    document.getElementById('bottom-sheet').classList.add('active');
}
function closeSheet() { document.getElementById('bottom-sheet').classList.remove('active'); }
function toggleRoadviewMode() { /* 기능 유지 */ }
function toggleCompassMode() {
    compassMode = !compassMode;
    const btn = document.getElementById('compass-btn'), cone = document.getElementById('view-cone');
    if (compassMode) {
        btn.classList.add('active'); if (cone) cone.style.display = 'block';
        window.addEventListener('deviceorientation', handleOrientation, true);
    } else {
        btn.classList.remove('active'); if (cone) cone.style.display = 'none';
        window.removeEventListener('deviceorientation', handleOrientation, true);
    }
}
function handleOrientation(e) {
    const cone = document.getElementById('view-cone');
    if (!cone || !compassMode) return;
    let heading = e.webkitCompassHeading || (360 - e.alpha);
    if (heading) cone.style.transform = `rotate(${heading}deg)`;
}
</script>
</body>
</html>
