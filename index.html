<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RECO Manager - Full Features</title>
    <style>
        :root { --primary-red: #ff4757; --primary-blue: #007bff; --kakao-yellow: #FFEB00; --lead-green: #2ecc71; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background: #f8f9fa; }
        
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-box { width: 100%; max-width: 340px; padding: 30px; background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 16px; background: #4285f4; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }

        #main-content { display: none; position: relative; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }

        /* 바텀 시트 */
        #bottom-sheet { 
            position: absolute; bottom: -100%; left: 0; width: 100%; background: white; 
            z-index: 2000; border-radius: 24px 24px 0 0; box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            transition: bottom 0.3s ease-in-out; padding: 25px 20px; box-sizing: border-box;
            max-height: 70vh; overflow-y: auto;
        }
        #bottom-sheet.active { bottom: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #e0e0e0; border-radius: 10px; margin: -10px auto 15px; cursor: pointer; }

        .side-btns { position: absolute; top: 20px; right: 15px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
        .side-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .side-btn.active { background: var(--kakao-yellow); color: #000; }
        .side-btn.compass-on { background: var(--primary-blue); color: white; }

        #rv-container { position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 3000; display: none; border-bottom: 2px solid #000; }
        #rv-close { position: absolute; top: 15px; right: 15px; z-index: 3001; background: rgba(0,0,0,0.6); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; }

        @keyframes rainbow-bg {
            0% { background: #ff0000; } 16% { background: #ff7f00; } 33% { background: #ffff00; }
            50% { background: #00ff00; } 66% { background: #0000ff; } 83% { background: #4b0082; } 100% { background: #9400d3; }
        }
        .user-marker-wrapper { position: relative; width: 300px; height: 300px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .rainbow-dot {
            width: 16px; height: 16px; border: 3.5px solid white; border-radius: 50%;
            animation: rainbow-bg 3s infinite linear; box-shadow: 0 0 10px rgba(0,0,0,0.4); z-index: 10;
        }
        .view-cone {
            position: absolute; width: 260px; height: 260px;
            background: radial-gradient(circle at 50% 50%, rgba(0, 123, 255, 0.45) 0%, rgba(0, 123, 255, 0.1) 60%, transparent 75%);
            clip-path: polygon(50% 50%, 15% 0%, 85% 0%); display: none; transition: transform 0.1s linear; z-index: 5;
        }

        .bottom-nav { 
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); 
            z-index: 10; display: flex; gap: 10px; background: rgba(255,255,255,0.9); 
            padding: 10px 20px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px); width: 85%; max-width: 400px; justify-content: space-around; 
        }
        .nav-btn { border: none; background: none; font-size: 13px; font-weight: bold; color: #ccc; cursor: pointer; }
        .nav-btn.active#btn-existing { color: var(--primary-red); }
        .nav-btn.active#btn-new { color: var(--primary-blue); }

        .marker-label { background: white; color: black; padding: 4px 12px; border-radius: 12px; border: 1.5px solid #333; font-size: 13px; font-weight: bold; white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .sheet-btn { flex: 1; padding: 15px; text-align: center; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2>RECO Manager</h2>
        <input type="text" id="username" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="checkLogin()">접속하기</button>
        <p id="error-msg" style="color:var(--primary-red); font-size:12px; display:none; margin-top:15px;">정보가 일치하지 않습니다.</p>
    </div>
</div>

<div id="main-content">
    <div class="side-btns">
        <button class="side-btn" onclick="location.reload()">🔑</button>
        <button id="loc-btn" class="side-btn" onclick="moveToCurrentLocation()">📍</button>
        <button id="rv-toggle-btn" class="side-btn" onclick="toggleRoadviewMode()">📷</button>
        <button id="compass-btn" class="side-btn" onclick="toggleCompassMode()">🧭</button>
    </div>

    <div id="rv-container">
        <button id="rv-close" onclick="closeRoadview()">닫기</button>
        <div id="roadview" style="width:100%;height:100%;"></div>
    </div>

    <div id="bottom-sheet">
        <div class="sheet-handle" onclick="closeSheet(); resetSelectedMarker();"></div>
        <div id="sheet-content"></div>
    </div>

    <div class="bottom-nav">
        <button id="btn-existing" class="nav-btn active" onclick="toggleFilter('existing')">■ 기존고객</button>
        <button id="btn-new" class="nav-btn active" onclick="toggleFilter('new')">▲ 나의영업</button>
    </div>

    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=674d9cff0f9b5e8d49e24339fdc1c033&libraries=services,clusterer"></script>

<script>
const loginCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=1603902648&single=true&output=csv';
const existingCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=0&single=true&output=csv';
const salesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=676390554&single=true&output=csv';

let map, userLatLng = null, userMarkerOverlay = null, rv, rvClient;
let allRawData = [], filterStatus = { existing: true, new: true };
let currentUserId = "", userRole = "saler", userLimitRange = 1000, userLimitArea = "";
let selectedMarker = null, labelOverlay = null, rvMode = false, compassMode = false;

const existingIcon = 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect width="14" height="14" x="1" y="1" fill="#ff4757" stroke="white" stroke-width="2"/></svg>');
const salesIcon = 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"><path fill="#007bff" stroke="white" stroke-width="2" d="M12 2L2 22h20L12 2z"/></svg>');

function cleanCoord(val) { return val ? parseFloat(val.toString().replace(/[^0-9.]/g, '')) : null; }

async function checkLogin() {
    const userIn = document.getElementById('username').value.trim().toLowerCase();
    const passIn = document.getElementById('password').value.trim();
    try {
        const res = await fetch(loginCsvUrl + '&t=' + Date.now());
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);
        let auth = false;
        for (let row of rows) {
            const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
            if (cols[0].toLowerCase() === userIn && cols[1] === passIn) { 
                auth = true; currentUserId = userIn; userRole = cols[2].toLowerCase(); 
                userLimitRange = parseInt(cols[3]) || 1000; userLimitArea = cols[4] || ""; break; 
            }
        }
        if (auth) {
            // 로그인 성공 시 위치 권한 먼저 체크
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    userLatLng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                    initApp(); // 위치를 잡은 후 앱 실행
                }, (err) => {
                    alert("위치 정보를 가져올 수 없습니다. 기본 위치로 설정합니다.");
                    userLatLng = new kakao.maps.LatLng(37.5668, 126.9786);
                    initApp();
                }, { enableHighAccuracy: true });
            } else {
                userLatLng = new kakao.maps.LatLng(37.5668, 126.9786);
                initApp();
            }
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    } catch (e) { alert("연결 실패"); }
}

function initApp() {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    
    // 수신된 사용자의 위치를 중심으로 지도 생성
    map = new kakao.maps.Map(document.getElementById('map'), { 
        center: userLatLng, 
        level: 4 
    });
    
    rvClient = new kakao.maps.RoadviewClient();
    rv = new kakao.maps.Roadview(document.getElementById('roadview'));

    kakao.maps.event.addListener(map, 'click', function(e) {
        if (rvMode) {
            rvClient.getNearestPanoId(e.latLng, 50, function(id) {
                if (id) {
                    document.getElementById('rv-container').style.display = 'block';
                    rv.setPanoId(id, e.latLng);
                } else { alert("로드뷰가 불가능한 지역입니다."); }
            });
        } else {
            closeSheet(); resetSelectedMarker();
        }
    });

    updateUserMarker(); // 내 위치 마커 표시
    startGPSWatch(); // 실시간 위치 감시 시작
    loadData();
}

// 실시간 위치 감시 (지속적인 업데이트)
function startGPSWatch() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition((pos) => {
            userLatLng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            updateUserMarker();
        }, null, { enableHighAccuracy: true });
    }
}

function updateUserMarker() {
    const content = `<div class="user-marker-wrapper"><div id="view-cone" class="view-cone"></div><div class="rainbow-dot"></div></div>`;
    if (!userMarkerOverlay) {
        userMarkerOverlay = new kakao.maps.CustomOverlay({
            position: userLatLng, content: content, xAnchor: 0.5, yAnchor: 0.5, zIndex: 100
        });
        userMarkerOverlay.setMap(map);
    } else {
        userMarkerOverlay.setPosition(userLatLng);
    }
}

function toggleRoadviewMode() {
    rvMode = !rvMode;
    const btn = document.getElementById('rv-toggle-btn');
    if (rvMode) {
        btn.classList.add('active');
        map.addOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW);
        alert("지도를 클릭하여 로드뷰를 확인하세요.");
    } else {
        btn.classList.remove('active');
        map.removeOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW);
        closeRoadview();
    }
}

function closeRoadview() { document.getElementById('rv-container').style.display = 'none'; }

function toggleCompassMode() {
    compassMode = !compassMode;
    const btn = document.getElementById('compass-btn');
    const cone = document.getElementById('view-cone');
    if (compassMode) {
        btn.classList.add('active');
        if (cone) cone.style.display = 'block';
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') window.addEventListener('deviceorientation', handleOrientation, true);
            });
        } else { window.addEventListener('deviceorientation', handleOrientation, true); }
    } else {
        btn.classList.remove('active');
        if (cone) cone.style.display = 'none';
        window.removeEventListener('deviceorientation', handleOrientation, true);
    }
}

function handleOrientation(event) {
    const cone = document.getElementById('view-cone');
    if (!cone || !compassMode) return;
    let heading = event.webkitCompassHeading || (360 - event.alpha);
    if (heading) cone.style.transform = `rotate(${heading}deg)`;
}

function moveToCurrentLocation() { if (userLatLng) map.panTo(userLatLng); }

async function loadData() {
    const [resExist, resSales] = await Promise.all([ fetch(existingCsvUrl + '&t=' + Date.now()), fetch(salesCsvUrl + '&t=' + Date.now()) ]);
    const txtExist = await resExist.text(), txtSales = await resSales.text();
    allRawData = [];
    txtExist.split(/\r?\n/).slice(1).forEach(row => {
        const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        if (c.length >= 4) allRawData.push({ type: 'existing', name: c[0], addr: c[1], lat: cleanCoord(c[2]), lng: cleanCoord(c[3]), extra: { "계약단가": c[4], "수거요일": c[6] } });
    });
    txtSales.split(/\r?\n/).slice(1).forEach(row => {
        const c = row.split(',').map(v => v.replace(/^"$/g, '').trim());
        if (c.length >= 5) allRawData.push({ type: 'new', ownerId: c[0]?.toLowerCase(), name: c[1], addr: c[2], lat: cleanCoord(c[3]), lng: cleanCoord(c[4]), extra: { "업종": c[5], "배출량": c[7] } });
    });
    refreshDataVisibility();
}

function refreshDataVisibility() {
    allRawData.forEach(d => { if(d.m) d.m.setMap(null); });
    allRawData.forEach(d => {
        if (!filterStatus[d.type]) return;
        const pos = new kakao.maps.LatLng(d.lat, d.lng);
        if (userRole === 'master' || d.type === 'existing' || (d.ownerId === currentUserId)) {
            const marker = new kakao.maps.Marker({ position: pos, image: new kakao.maps.MarkerImage(d.type === 'existing' ? existingIcon : salesIcon, new kakao.maps.Size(16, 16)) });
            d.m = marker; marker.setMap(map);
            kakao.maps.event.addListener(marker, 'click', function() { highlightMarker(marker, d); showSheet(d); map.panTo(pos); });
        }
    });
}

function highlightMarker(marker, data) {
    resetSelectedMarker();
    selectedMarker = marker;
    const size = data.type === 'existing' ? 26 : 35;
    marker.setImage(new kakao.maps.MarkerImage(data.type === 'existing' ? existingIcon : salesIcon, new kakao.maps.Size(size, size)));
    labelOverlay = new kakao.maps.CustomOverlay({ position: marker.getPosition(), content: `<div class="marker-label">${data.name}</div>`, yAnchor: 2.5 });
    labelOverlay.setMap(map);
}

function resetSelectedMarker() {
    if (selectedMarker) {
        const type = allRawData.find(d => d.m === selectedMarker)?.type;
        selectedMarker.setImage(new kakao.maps.MarkerImage(type === 'existing' ? existingIcon : salesIcon, new kakao.maps.Size(16, 16)));
    }
    if (labelOverlay) { labelOverlay.setMap(null); labelOverlay = null; }
    selectedMarker = null;
}

function showSheet(data) {
    const content = document.getElementById('sheet-content');
    let html = `<div style="font-size:20px; font-weight:bold; margin-bottom:5px;">${data.name}</div><div style="font-size:13px; color:#888;">${data.addr}</div><div class="sheet-grid">`;
    Object.entries(data.extra).forEach(([k, v]) => { html += `<div class="info-item">${k}<b>${v || '-'}</b></div>`; });
    html += `</div><div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
                <a href="https://map.kakao.com/link/to/${encodeURIComponent(data.name)},${data.lat},${data.lng}" target="_blank" class="sheet-btn" style="background:var(--kakao-yellow); color:#3C1E1E;">🚕 길찾기</a>`;
    if (data.type === 'new') html += `<a href="https://walla.my/v/GEQSSOWtFYHulcSoAKC3" target="_blank" class="sheet-btn" style="background:var(--lead-green); color:white;">📝 리드건 신청</a>`;
    html += `</div>`;
    content.innerHTML = html;
    document.getElementById('bottom-sheet').classList.add('active');
}

function closeSheet() { document.getElementById('bottom-sheet').classList.remove('active'); }
function toggleFilter(type) { filterStatus[type] = !filterStatus[type]; document.getElementById('btn-' + type).classList.toggle('active', filterStatus[type]); refreshDataVisibility(); }
</script>
</body>
</html>
