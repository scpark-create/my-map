<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RECO Manager - 검색 및 위치추적</title>
    <style>
        :root { --primary-color: #4285f4; --danger-color: #ff4757; --kakao-yellow: #FFEB00; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; overflow: hidden; background: #f8f9fa; }
        
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; box-sizing: border-box; }
        .login-box { width: 100%; max-width: 340px; padding: 30px; background: white; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; outline: none; background: #fdfdfd; }
        .login-box button { width: 100%; padding: 16px; background: var(--primary-color); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }

        #main-content { display: none; position: relative; width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }

        /* 좌측 상단 검색창 */
        #search-box { position: absolute; top: 20px; left: 20px; z-index: 20; width: 250px; }
        #search-input { width: 100%; padding: 12px 15px; border-radius: 12px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.15); font-size: 14px; outline: none; }
        #search-results { position: absolute; width: 100%; background: white; border-radius: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .result-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .result-item:last-child { border: none; }

        /* 하단 네비게이션 바 (나의 위치 찾기 추가) */
        .bottom-nav { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 5px; background: rgba(255,255,255,0.9); padding: 12px 15px; border-radius: 50px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); backdrop-filter: blur(10px); width: 92%; max-width: 450px; justify-content: space-around; }
        .nav-btn { border: none; background: none; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; color: #666; cursor: pointer; white-space: nowrap; }
        .nav-btn.active { color: var(--primary-color); }
        .nav-btn.gps-btn { color: #34a853; } /* 위치 찾기 버튼 전용 색상 */
        
        .logout-pill { position: absolute; top: 20px; right: 20px; z-index: 10; background: var(--danger-color); color: white; border: none; padding: 10px 18px; border-radius: 25px; font-weight: bold; font-size: 12px; }
        .info-content { padding: 10px; min-width: 210px; line-height: 1.5; }
        .action-btn { display: block; margin-top: 8px; padding: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 13px; text-align: center; }
        .lead-btn { background: #6c5ce7; color: white; margin-bottom: 5px; }
        .navi-btn { background: var(--kakao-yellow); color: #3C1E1E; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-box">
        <h2 style="color:#333;">RECO Manager</h2>
        <input type="text" id="username" placeholder="아이디" autocomplete="off">
        <input type="password" id="password" placeholder="비밀번호">
        <button onclick="checkLogin()">접속하기</button>
        <p id="error-msg" style="color:var(--danger-color); font-size:12px; display:none; margin-top:15px;">정보가 일치하지 않습니다.</p>
    </div>
</div>

<div id="main-content">
    <div id="search-box">
        <input type="text" id="search-input" placeholder="업장명 검색..." oninput="handleSearch()">
        <div id="search-results"></div>
    </div>

    <button class="logout-pill" onclick="location.reload()">로그아웃</button>
    
    <div class="bottom-nav">
        <button class="nav-btn gps-btn" onclick="moveToCurrentLocation()">
            <span style="font-size:16px;">📍</span><span>나의 위치 찾기</span>
        </button>
        <button id="btn-existing" class="nav-btn active" onclick="toggleFilter('existing')">
            <span style="font-size:16px;">●</span><span>기존고객</span>
        </button>
        <button id="btn-new" class="nav-btn active" onclick="toggleFilter('new')">
            <span style="font-size:16px;">★</span><span>나의영업</span>
        </button>
    </div>
    <div id="map"></div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=674d9cff0f9b5e8d49e24339fdc1c033&libraries=services"></script>

<script>
const loginCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=1603902648&single=true&output=csv';
const existingCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=0&single=true&output=csv';
const salesCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTMzDZTY1xtxilWxjwwUhjXnIFis1P7BxLP8j6csZKBOdmg66V4vlPoTSo66hXvokDY87bGvVPY9vBm/pub?gid=676390554&single=true&output=csv';
const leadFormUrl = 'https://walla.my/v/GEQSSOWtFYHulcSoAKC3';

let map, geocoder, userLatLng = null, allMarkers = [], infoWindows = [], filterStatus = { existing: true, new: true };
let userRole = "saler"; 
let userLimitRange = 1000; 
let userMarker = null; // 현재 위치 표시용 커스텀 오버레이

async function checkLogin() {
    const userIn = document.getElementById('username').value.trim();
    const passIn = document.getElementById('password').value.trim();
    try {
        const res = await fetch(loginCsvUrl + '&t=' + new Date().getTime());
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);
        let auth = false;
        for (let row of rows) {
            const cols = row.split(',').map(c => c.replace(/^"|"$/g, '').trim());
            if (cols[0] === userIn && cols[1] === passIn) { 
                auth = true; 
                userRole = cols[2] || "saler";
                userLimitRange = parseInt(cols[3]) || 1000;
                break; 
            }
        }
        if (auth) { requestPosition(); } 
        else { document.getElementById('error-msg').style.display = 'block'; }
    } catch (e) { alert("로그인 서버 응답 없음"); }
}

function requestPosition() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            userLatLng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            initApp();
        }, () => {
            userLatLng = new kakao.maps.LatLng(37.5668, 126.9786);
            initApp();
        }, { enableHighAccuracy: true });
    } else { initApp(); }
}

function initApp() {
    document.getElementById('login-container').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    map = new kakao.maps.Map(document.getElementById('map'), { center: userLatLng, level: 4 });
    geocoder = new kakao.maps.services.Geocoder();
    
    updateUserMarker();
    loadData();

    // 지도 클릭 시 검색 결과 닫기
    kakao.maps.event.addListener(map, 'click', () => {
        document.getElementById('search-results').style.display = 'none';
    });
}

// 내 위치 찾기 버튼 로직
function moveToCurrentLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
            userLatLng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
            map.panTo(userLatLng);
            updateUserMarker();
        }, () => {
            alert("현재 위치를 가져올 수 없습니다.");
        }, { enableHighAccuracy: true });
    }
}

// 내 위치 파란 점 갱신
function updateUserMarker() {
    if (userMarker) userMarker.setMap(null);
    if(userLatLng) {
        userMarker = new kakao.maps.CustomOverlay({
            position: userLatLng,
            content: '<div style="width:14px;height:14px;background:#4285f4;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(0,0,0,0.3);"></div>'
        });
        userMarker.setMap(map);
    }
}

async function loadData() {
    const resExist = await fetch(existingCsvUrl + '&t=' + new Date().getTime());
    const rowsExist = (await resExist.text()).split(/\r?\n/).filter(r => r.trim()).slice(1);
    for (const row of rowsExist) {
        const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        await createMarkerAsync(c[1], c[0], c[4], c[5], c[6], c[7], 'existing');
    }

    const resSales = await fetch(salesCsvUrl + '&t=' + new Date().getTime());
    const rowsSales = (await resSales.text()).split(/\r?\n/).filter(r => r.trim()).slice(1);
    for (const row of rowsSales) {
        const c = row.split(',').map(v => v.replace(/^"|"$/g, '').trim());
        await createMarkerAsync(c[1], c[0], c[4], c[5], c[6], c[7], 'new');
    }
}

function createMarkerAsync(addr, name, memo, price, amount, vehicle, type) {
    return new Promise((resolve) => {
        if(!addr || addr.length < 5) return resolve();
        geocoder.addressSearch(addr, (result, status) => {
            if (status === kakao.maps.services.Status.OK) {
                const coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                
                if (userRole === 'saler' && userLatLng) {
                    const poly = new kakao.maps.Polyline({ path: [userLatLng, coords] });
                    if (poly.getLength() > userLimitRange) return resolve();
                }

                const marker = new kakao.maps.Marker({ 
                    position: coords, 
                    image: (type === 'new' ? new kakao.maps.MarkerImage('https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png', new kakao.maps.Size(24, 35)) : null), 
                    map: map 
                });
                
                marker.customerType = type;
                marker.customerName = name; // 검색용 데이터 저장
                allMarkers.push(marker);

                const iwContent = `
                    <div class="info-content" style="background-color:${type === 'existing' ? '#e9ecef' : '#fff'}">
                        <strong>${name}</strong><br><small>${addr}</small>
                        <div style="background:rgba(0,0,0,0.05); padding:8px; border-radius:8px; margin:8px 0; font-size:12px;">
                            단가: ${price || '-'} | 배출: ${amount || '-'}<br>차량: ${vehicle || '-'}
                        </div>
                        <div style="font-size:11px; margin-bottom:8px; color:#444;">${memo || ''}</div>
                        ${type === 'new' ? `<a href="${leadFormUrl}" target="_blank" class="action-btn lead-btn">📝 영업 리드 기입</a>` : ''}
                        <a href="https://map.kakao.com/link/to/${encodeURIComponent(name)},${result[0].y},${result[0].x}" target="_blank" class="action-btn navi-btn">🚕 카카오 길찾기</a>
                    </div>`;

                const iw = new kakao.maps.InfoWindow({ content: iwContent, removable: true });
                marker.infoWindow = iw; // 검색 연동용

                kakao.maps.event.addListener(marker, 'click', () => {
                    infoWindows.forEach(w => w.close());
                    iw.open(map, marker);
                    infoWindows.push(iw);
                });
            }
            resolve();
        });
    });
}

// 검색 기능 핸들러
function handleSearch() {
    const val = document.getElementById('search-input').value.trim().toLowerCase();
    const results = document.getElementById('search-results');
    results.innerHTML = '';
    
    if(!val) { results.style.display = 'none'; return; }

    const filtered = allMarkers.filter(m => m.customerName.toLowerCase().includes(val));

    if(filtered.length > 0) {
        results.style.display = 'block';
        filtered.forEach(m => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<strong>${m.customerName}</strong> <span style="font-size:10px; color:#999;">(${m.customerType === 'existing' ? '기존' : '영업'})</span>`;
            div.onclick = () => {
                map.panTo(m.getPosition());
                map.setLevel(3);
                infoWindows.forEach(w => w.close());
                m.infoWindow.open(map, m);
                infoWindows.push(m.infoWindow);
                results.style.display = 'none';
                document.getElementById('search-input').value = m.customerName;
            };
            results.appendChild(div);
        });
    } else {
        results.style.display = 'none';
    }
}

function toggleFilter(type) {
    infoWindows.forEach(w => w.close());
    filterStatus[type] = !filterStatus[type];
    document.getElementById('btn-' + type).classList.toggle('active', filterStatus[type]);
    allMarkers.forEach(m => { if (m.customerType === type) m.setMap(filterStatus[type] ? map : null); });
}
</script>
</body>
</html>
